name: Update Data v11_2

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install processor dependencies
        working-directory: processor
        run: npm install

      - name: Run river processor
        working-directory: processor
        run: node process.js

      - name: Run tide processor
        working-directory: processor
        run: node tides.js

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/

          git diff --staged --quiet || git commit -m "Update river and tide data"

          git push
